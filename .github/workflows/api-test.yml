name: api-test

on:
  push:
  workflow_dispatch:

jobs:
  api-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Start mock server
        run: |
          python CeresAPITestLite/mock_server.py &
          sleep 2
      - name: Run API tests
        run: python CeresAPITestLite/run_tests.py --case CeresAPITestLite/cases/demo_cases.json --report-dir CeresAPITestLite/reports
      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: api-test-reports
          path: CeresAPITestLite/reports

